name: Cross-Architecture Tests (RISC-V & LoongArch)

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'src/**/*.rs'
      - 'tests/**/*.rs'
      - '.github/workflows/cross-arch-tests.yml'
  pull_request:
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'src/**/*.rs'
      - 'tests/**/*.rs'
      - '.github/workflows/cross-arch-tests.yml'

concurrency:
  group: cross-arch-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # Native x86_64 smoke test (baseline)
  native-x86_64:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: cross-arch-native

      - name: Build
        run: cargo build --release

      - name: Run isolated tests
        run: cargo test --test isolated_test

      - name: Run basic eval test
        run: |
          ./target/release/ai-agent --eval "print('Hello from x86_64')"
          ./target/release/ai-agent --eval "print(1 + 2)"
          ./target/release/ai-agent --eval "print(typeof Temporal)"

  # RISC-V 64-bit (riscv64gc-unknown-linux-gnu) via QEMU
  riscv64:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: riscv64gc-unknown-linux-gnu

      - name: Install cross-compilation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-riscv64-linux-gnu g++-riscv64-linux-gnu qemu-user-static

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: cross-arch-riscv64

      - name: Configure cargo for cross-compilation
        run: |
          mkdir -p ~/.cargo
          cat >> ~/.cargo/config.toml << 'EOF'
          [target.riscv64gc-unknown-linux-gnu]
          linker = "riscv64-linux-gnu-gcc"
          runner = "qemu-riscv64-static -L /usr/riscv64-linux-gnu"
          EOF

      - name: Build for RISC-V 64
        run: cargo build --release --target riscv64gc-unknown-linux-gnu
        env:
          CC_riscv64gc_unknown_linux_gnu: riscv64-linux-gnu-gcc
          CXX_riscv64gc_unknown_linux_gnu: riscv64-linux-gnu-g++

      - name: Run basic eval tests via QEMU
        run: |
          qemu-riscv64-static -L /usr/riscv64-linux-gnu ./target/riscv64gc-unknown-linux-gnu/release/ai-agent --eval "print('Hello from RISC-V 64')"
          qemu-riscv64-static -L /usr/riscv64-linux-gnu ./target/riscv64gc-unknown-linux-gnu/release/ai-agent --eval "print(1 + 2)"
          qemu-riscv64-static -L /usr/riscv64-linux-gnu ./target/riscv64gc-unknown-linux-gnu/release/ai-agent --eval "print(typeof Temporal)"
          qemu-riscv64-static -L /usr/riscv64-linux-gnu ./target/riscv64gc-unknown-linux-gnu/release/ai-agent --eval "print(JSON.stringify([1,2,3].map(x => x * 2)))"

      - name: Run isolated tests via QEMU (limited)
        run: |
          cargo test --release --target riscv64gc-unknown-linux-gnu --test isolated_test -- --test-threads=1
        env:
          CC_riscv64gc_unknown_linux_gnu: riscv64-linux-gnu-gcc
          CXX_riscv64gc_unknown_linux_gnu: riscv64-linux-gnu-g++
        continue-on-error: true

  # LoongArch 64-bit (loongarch64-unknown-linux-gnu) via Docker + QEMU
  loongarch64:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    container:
      image: debian:sid
    steps:
      - name: Install container dependencies
        run: |
          apt-get update
          apt-get install -y git curl ca-certificates xz-utils qemu-user-static gcc-loongarch64-linux-gnu g++-loongarch64-linux-gnu pkg-config build-essential

      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Rust nightly
        env:
          CARGO_HOME: /github/home/.cargo
          RUSTUP_HOME: /github/home/.rustup
        run: |
          curl https://sh.rustup.rs -sSf | sh -s -- -y --default-toolchain nightly --profile minimal
          echo "$CARGO_HOME/bin" >> "$GITHUB_PATH"
          "$CARGO_HOME/bin/rustup" target add --toolchain nightly loongarch64-unknown-linux-gnu
          "$CARGO_HOME/bin/rustc" +nightly --version
          "$CARGO_HOME/bin/cargo" +nightly --version
          "$CARGO_HOME/bin/rustup" show

      - name: Configure cargo for cross-compilation
        run: |
          mkdir -p "$HOME/.cargo"
          cat >> "$HOME/.cargo/config.toml" << 'EOF'
          [target.loongarch64-unknown-linux-gnu]
          linker = "loongarch64-linux-gnu-gcc"
          runner = "qemu-loongarch64-static -L /usr/loongarch64-linux-gnu"
          EOF

      - name: Build for LoongArch 64
        run: cargo +nightly build --release --target loongarch64-unknown-linux-gnu
        env:
          CARGO_HOME: /github/home/.cargo
          RUSTUP_HOME: /github/home/.rustup
          CC_loongarch64_unknown_linux_gnu: loongarch64-linux-gnu-gcc
          CXX_loongarch64_unknown_linux_gnu: loongarch64-linux-gnu-g++

      - name: Run basic eval tests via QEMU
        run: |
          qemu-loongarch64-static -L /usr/loongarch64-linux-gnu ./target/loongarch64-unknown-linux-gnu/release/ai-agent --eval "print('Hello from LoongArch 64')"
          qemu-loongarch64-static -L /usr/loongarch64-linux-gnu ./target/loongarch64-unknown-linux-gnu/release/ai-agent --eval "print(1 + 2)"
          qemu-loongarch64-static -L /usr/loongarch64-linux-gnu ./target/loongarch64-unknown-linux-gnu/release/ai-agent --eval "print(typeof Temporal)"

      - name: Run isolated tests via QEMU (limited)
        run: cargo +nightly test --release --target loongarch64-unknown-linux-gnu --test isolated_test -- --test-threads=1
        env:
          CARGO_HOME: /github/home/.cargo
          RUSTUP_HOME: /github/home/.rustup
          CC_loongarch64_unknown_linux_gnu: loongarch64-linux-gnu-gcc
          CXX_loongarch64_unknown_linux_gnu: loongarch64-linux-gnu-g++

      - name: Report LoongArch status
        if: always()
        run: |
          echo "## LoongArch 64-bit Build Status" >> $GITHUB_STEP_SUMMARY
          if [ -f ./target/loongarch64-unknown-linux-gnu/release/ai-agent ]; then
            echo "✅ Binary built successfully" >> $GITHUB_STEP_SUMMARY
            echo "✅ QEMU smoke tests configured" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Binary build failed" >> $GITHUB_STEP_SUMMARY
          fi


  # Summary job
  summary:
    needs: [native-x86_64, riscv64, loongarch64]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Generate summary
        run: |
          echo "# Cross-Architecture Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Architecture | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| x86_64 (native) | ${{ needs.native-x86_64.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| RISC-V 64 (QEMU) | ${{ needs.riscv64.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| LoongArch 64 (QEMU) | ${{ needs.loongarch64.result }} |" >> $GITHUB_STEP_SUMMARY
