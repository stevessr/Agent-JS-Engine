name: test262 core profile

on:
  workflow_dispatch:

concurrency:
  group: test262-core-profile-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  isolated-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: test262-core-profile

      - name: Run isolated smoke tests
        run: cargo test --test isolated_test

  core-profile-shards:
    needs: isolated-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: 1
            offset: 0
            max_cases: 5500
          - shard: 2
            offset: 5500
            max_cases: 5500
          - shard: 3
            offset: 11000
            max_cases: 5500
          - shard: 4
            offset: 16500
            max_cases: 5500
          - shard: 5
            offset: 22000
            max_cases: 5500
          - shard: 6
            offset: 27500
            max_cases: 5500
          - shard: 7
            offset: 33000
            max_cases: 5500
          - shard: 8
            offset: 38500
            max_cases: 5500
          - shard: 9
            offset: 44000
            max_cases: 5500
          - shard: 10
            offset: 49500
            max_cases: 1500
          - shard: 11
            offset: 51000
            max_cases: 1000
          - shard: 12
            offset: 52000
            max_cases: 150
          - shard: 13
            offset: 52150
            max_cases: 150
          - shard: 14
            offset: 52300
            max_cases: 20
          - shard: 15
            offset: 52320
            max_cases: 20
          - shard: 16
            offset: 52340
            max_cases: 20
          - shard: 17
            offset: 52360
            max_cases: 5
          - shard: 18
            offset: 52365
            max_cases: 5
          - shard: 19
            offset: 0
            max_cases: 1
            filter: test/staging/sm/String/raw.js
          - shard: 20
            offset: 0
            max_cases: 1
            filter: test/staging/sm/String/regress-369778.js
          - shard: 21
            offset: 0
            max_cases: 1
            filter: test/staging/sm/String/replace-GetMethod.js
          - shard: 22
            offset: 0
            max_cases: 1
            filter: test/staging/sm/String/replace-bad-dollar-single-quote.js
          - shard: 23
            offset: 0
            max_cases: 1
            filter: test/staging/sm/String/replace-flags.js
          - shard: 24
            offset: 52375
            max_cases: 75
          - shard: 25
            offset: 52450
            max_cases: 75
          - shard: 26
            offset: 52525
            max_cases: 75
          - shard: 27
            offset: 52600
            max_cases: 150
          - shard: 28
            offset: 52750
            max_cases: 150
          - shard: 29
            offset: 52900
            max_cases: 112
          - shard: 30
            offset: 53012
            max_cases: 113
    env:
      CARGO_TERM_COLOR: always
      TEST262_OFFSET: ${{ matrix.offset }}
      TEST262_MAX_CASES: ${{ matrix.max_cases }}
      TEST262_FILTER_OVERRIDE: ${{ matrix.filter || '' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: test262-core-profile

      - name: Fetch test262 suite
        run: |
          git clone --depth 1 --filter=blob:none --sparse https://github.com/tc39/test262.git test262
          git -C test262 sparse-checkout set test harness

      - name: Run shard ${{ matrix.shard }}
        shell: bash
        env:
          SHARD_ID: ${{ matrix.shard }}
        run: |
          set -euo pipefail
          heartbeat() {
            while sleep 60; do
              echo "[heartbeat] shard ${SHARD_ID} still running"
            done
          }
          heartbeat &
          HEARTBEAT_PID=$!
          trap 'kill ${HEARTBEAT_PID} >/dev/null 2>&1 || true' EXIT
          if [ -n "${TEST262_FILTER_OVERRIDE:-}" ]; then
            export TEST262_FILTER="${TEST262_FILTER_OVERRIDE}"
          fi
          cargo test --test test262_runner -- --ignored --exact test262_core_profile --nocapture | tee shard.log

      - name: Extract shard summary
        if: always()
        env:
          SHARD_ID: ${{ matrix.shard }}
        run: |
          python - <<'PY'
          import json
          import os
          import pathlib
          import re

          text = pathlib.Path('shard.log').read_text() if pathlib.Path('shard.log').exists() else ''

          def last_int(label: str) -> int:
              matches = re.findall(rf"{re.escape(label)}: (\d+)", text)
              return int(matches[-1]) if matches else 0

          summary = {
              'shard': int(os.environ['SHARD_ID']),
              'total': last_int('Total cases'),
              'executed': last_int('Executed'),
              'passed': last_int('Passed'),
              'skipped': last_int('Skipped'),
          }
          pathlib.Path('summary.json').write_text(json.dumps(summary))
          PY

      - name: Upload shard summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shard-${{ matrix.shard }}
          path: summary.json

  aggregate:
    needs: core-profile-shards
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Download shard summaries
        uses: actions/download-artifact@v4
        with:
          path: shard-summaries

      - name: Aggregate results
        run: |
          python - <<'PY'
          import json
          import pathlib
          import sys

          total = executed = passed = skipped = 0
          for summary in pathlib.Path('shard-summaries').rglob('summary.json'):
              data = json.loads(summary.read_text())
              total += data.get('total', 0)
              executed += data.get('executed', 0)
              passed += data.get('passed', 0)
              skipped += data.get('skipped', 0)

          total_pass_rate = (passed / total * 100.0) if total else 0.0
          executed_pass_rate = (passed / executed * 100.0) if executed else 0.0

          print(f'Total cases: {total}')
          print(f'Executed: {executed}')
          print(f'Passed: {passed}')
          print(f'Skipped: {skipped}')
          print(f'Total pass rate: {total_pass_rate:.2f}%')
          print(f'Executed pass rate: {executed_pass_rate:.2f}%')

          if total_pass_rate < 60.0:
              sys.exit(f'expected total pass rate >= 60%, got {total_pass_rate:.2f}%')
          PY
